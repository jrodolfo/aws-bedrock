name: main

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install jq on macOS
        if: runner.os == 'macOS'
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi

      - name: Install jq on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Get-Command jq -ErrorAction SilentlyContinue)) {
            choco install jq -y
          }

      - name: Show tool versions
        shell: bash
        run: |
          bash --version | head -n 1
          jq --version

      - name: Run syntax checks
        shell: bash
        run: |
          bash -n generate-image.sh
          bash -n generate-text.sh
          bash -n tests/test-generate-image.sh
          bash -n tests/test-generate-text.sh

      - name: Run tests
        shell: bash
        run: |
          bash ./tests/test-generate-image.sh
          bash ./tests/test-generate-text.sh
