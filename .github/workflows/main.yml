name: main

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup jq
        uses: jqlang/setup-jq@v4

      - name: Run syntax checks
        shell: bash
        run: |
          bash -n generate-image.sh
          bash -n generate-text.sh
          bash -n tests/test-generate-image.sh
          bash -n tests/test-generate-text.sh

      - name: Run tests
        shell: bash
        run: |
          bash ./tests/test-generate-image.sh
          bash ./tests/test-generate-text.sh
